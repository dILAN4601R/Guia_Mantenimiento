<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Guía de Mantenimiento</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="contenedor">

        <div class="encabezado">

            <img
                src="Logo.PNG"
                alt="DM Electronics"
                class="banner">

            <p class="autor">
                Desarrollado por Dilan Mendoza
            </p>

            <div
                id="consecutivoActual"
                class="consecutivo">

                N0001

            </div>

            <h1>
                Guía de Mantenimiento
            </h1>

        </div>

        <form id="formulario">

            <label>
                Fecha
            </label>

            <input
                type="text"
                id="fecha"
                readonly>

            <label>
                Hora
            </label>

            <input
                type="text"
                id="hora"
                readonly>

            <label>
                Técnico
            </label>

            <input
                type="text"
                id="tecnico">

            <label>
                Tipo de mantenimiento
            </label>

            <select id="tipoMantenimiento">

                <option>
                    Preventivo
                </option>

                <option>
                    Correctivo
                </option>

                <option>
                    Seguimiento
                </option>

            </select>

            <label>
                Tipo de máquina
            </label>

            <input
                type="text"
                id="tipoMaquina">

            <label>
                Nombre del equipo
            </label>

            <input
                type="text"
                id="nombreEquipo">

            <label>
                Serie
            </label>

            <input
                type="text"
                id="serie">

            <h2>
                Foto General
            </h2>

            <input
                type="file"
                id="fotoGeneral"
                accept="image/*">

            <h2>
                Estado Inicial
            </h2>

            <textarea
                id="estadoInicial"
                rows="5"></textarea>

            <input
                type="file"
                id="fotoInicial"
                accept="image/*">

            <h2>
                Intervención
            </h2>

            <textarea
                id="intervencion"
                rows="6"></textarea>

            <input
                type="file"
                id="fotoIntervencion"
                accept="image/*">

            <hr>

            <h2>
                Repuestos Instalados
            </h2>

            <div id="contenedorRepuestos">

            </div>

            <button
                type="button"
                id="btnAgregarRepuesto">

                ➕ Agregar Repuesto

            </button>

            <hr>

            <h2>
                Estado Final
            </h2>

            <textarea
                id="estadoFinal"
                rows="5"></textarea>

            <input
                type="file"
                id="fotoFinal"
                accept="image/*">

            <h2>
                Observaciones
            </h2>

            <textarea
                id="observaciones"
                rows="5"></textarea>

            <button
                type="button"
                id="btnGenerar">

                Generar PDF

            </button>

        </form>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="app.js"></script>

</body>

</html>
